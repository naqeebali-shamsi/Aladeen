name: secret-scan

# Bypass-proof backstop: the pre-commit hook can be skipped (--no-verify) or
# missing (gitleaks not installed locally); CI cannot. Same .gitleaks.toml drives
# both, so there's a single source of truth and no drift. Make this a required
# status check on main in branch protection.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so a PR scans every new commit, not just the tip
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action@v2 requires GITHUB_TOKEN to scan pull_request events
          # (it reads the PR commit range via the API). Without it the action
          # hard-errors on PRs — push events scan fine but PRs stay red.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
